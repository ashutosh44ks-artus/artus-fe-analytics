<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founders Access - Artus AI</title>
    <link rel="preconnect" data-href="https://fonts.googleapis.com">
    <link rel="preconnect" data-href="https://fonts.gstatic.com" crossorigin>
    <link data-href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .app-container::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 69, 0, 0.15) 0%, transparent 70%);
            top: -250px;
            right: -250px;
            animation: pulse 4s ease-in-out infinite;
        }

        .app-container::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 69, 0, 0.1) 0%, transparent 70%);
            bottom: -200px;
            left: -200px;
            animation: pulse 4s ease-in-out infinite 2s;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        .content-wrapper {
            width: 100%;
            max-width: 480px;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 1;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-container {
            margin-bottom: 8px;
            animation: fadeIn 0.4s ease-out 0.2s backwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .logo {
            height: 48px;
            width: auto;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s ease;
            filter: drop-shadow(0 0 12px rgba(255, 69, 0, 0.6));
        }

        .logo:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 20px rgba(255, 69, 0, 0.8));
        }

        .luna-label {
            font-size: 14px;
            font-weight: 600;
            color: #FF9966;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 32px;
            animation: fadeIn 0.4s ease-out 0.25s backwards;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF 0%, #FF4500 50%, #FFFFFF 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: 0.02em;
            animation: fadeIn 0.4s ease-out 0.3s backwards, shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% {
                background-position: 0% center;
            }
            50% {
                background-position: 100% center;
            }
        }

        .helper-text {
            font-size: 15px;
            color: #D1D5DB;
            line-height: 1.6;
            font-weight: 400;
            letter-spacing: 0.01em;
            animation: fadeIn 0.4s ease-out 0.5s backwards;
            max-width: 420px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .helper-text-emphasis {
            color: #FF9966;
            font-weight: 500;
        }

        .main-content {
            margin-top: 40px;
            margin-bottom: 32px;
        }

        .status-message {
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-message.sending {
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.4);
            color: #FFD700;
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.2);
        }

        .status-message.sent {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid rgba(76, 175, 80, 0.4);
            color: #FFFFFF;
            box-shadow: 0 4px 16px rgba(76, 175, 80, 0.2);
        }

        .status-message.failed {
            background: rgba(255, 77, 77, 0.15);
            border: 1px solid rgba(255, 77, 77, 0.4);
            color: #FF4D4D;
            box-shadow: 0 4px 16px rgba(255, 77, 77, 0.2);
        }

        .status-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 215, 0, 0.3);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-primary {
            width: 100%;
            padding: 18px 32px;
            background: linear-gradient(135deg, #FF4500 0%, #FF7A00 50%, #FF9933 100%);
            background-size: 200% auto;
            color: #FFFFFF;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 6px 20px rgba(255, 69, 0, 0.4), 0 0 40px rgba(255, 69, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 14px;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.6), 0 0 60px rgba(255, 69, 0, 0.3);
            background-position: 100% center;
        }

        .btn-primary:hover::before {
            opacity: 1;
        }

        .btn-primary:active::after {
            width: 300px;
            height: 300px;
            transition: width 0s, height 0s;
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(255, 69, 0, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary:focus-visible {
            outline: 2px solid #FFFFFF;
            outline-offset: 2px;
        }

        .btn-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.5));
        }

        .footer {
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid rgba(255, 69, 0, 0.2);
        }

        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #BBBBBB;
            font-size: 13px;
        }

        .security-icon {
            width: 16px;
            height: 16px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                filter: drop-shadow(0 0 2px rgba(255, 69, 0, 0.4));
            }
            50% {
                filter: drop-shadow(0 0 6px rgba(255, 69, 0, 0.8));
            }
        }

        @media (max-width: 640px) {
            .app-container {
                padding: 16px;
            }

            .page-title {
                font-size: 28px;
            }

            .luna-label {
                font-size: 13px;
            }

            .logo {
                height: 40px;
            }

            .btn-primary {
                padding: 16px 28px;
                font-size: 13px;
            }

            .helper-text {
                font-size: 14px;
                padding: 0 8px;
            }
        }

        @media (min-width: 641px) and (max-width: 1024px) {
            .app-container {
                padding: 32px;
            }
        }

        @media (min-width: 1025px) {
            .page-title {
                font-size: 36px;
            }

            .luna-label {
                font-size: 15px;
            }

            .btn-primary {
                padding: 20px 36px;
                font-size: 15px;
            }

            .helper-text {
                font-size: 16px;
            }
        }

        .fade-out {
            animation: fadeOut 0.3s ease-out forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="content-wrapper">
            <div class="header">
                <div class="logo-container">
                    <img src="https://haseeb3294.sirv.com/artus/orrange-logo.png" alt="Artus AI" class="logo">
                </div>
                <div class="luna-label">Luna</div>
                <h1 class="page-title">Founders Access</h1>
                
                <p class="helper-text">
                    Sometimes you gotta run before you can walk. <span class="helper-text-emphasis">Access code</span> deploying to your <span class="helper-text-emphasis">secure channels</span>.
                </p>
            </div>

            <div class="main-content">
                <div class="status-message sending" id="statusSending">
                    <div class="spinner"></div>
                    <span>Transmitting quantum code...</span>
                </div>

                <div class="status-message sent" id="statusSent">
                    <svg class="status-icon" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                    </svg>
                    <span>Quantum code transmitted! Check your neural interface.</span>
                </div>

                <div class="status-message failed" id="statusFailed">
                    <svg class="status-icon" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                    </svg>
                    <span>Transmission failed. Please retry neural sync.</span>
                </div>

                <button class="btn-primary" id="sendOtpBtn" data-route="SCR044">
                    <svg class="btn-icon" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
                        <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
                    </svg>
                    Activate Access Protocol
                </button>
            </div>

            <div class="footer">
                <div class="security-badge">
                    <svg class="security-icon" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                    </svg>
                    <span>Powered by Artus Analytics core</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sendOtpBtn = document.getElementById('sendOtpBtn');
        const statusSending = document.getElementById('statusSending');
        const statusSent = document.getElementById('statusSent');
        const statusFailed = document.getElementById('statusFailed');

        sendOtpBtn.addEventListener('click', function(e) {
            e.preventDefault();
            
            // Hide all status messages
            statusSending.style.display = 'none';
            statusSent.style.display = 'none';
            statusFailed.style.display = 'none';
            
            // Show sending state
            statusSending.style.display = 'flex';
            sendOtpBtn.disabled = true;
            
            // Simulate OTP sending (90% success rate)
            setTimeout(() => {
                statusSending.style.display = 'none';
                
                if (Math.random() > 0.1) {
                    // Success
                    statusSent.style.display = 'flex';
                    setTimeout(() => {
                        window.location.href = '#SCR044';
                    }, 1500);
                } else {
                    // Failure
                    statusFailed.style.display = 'flex';
                    sendOtpBtn.disabled = false;
                }
            }, 2000);
        });
    </script>
</body>
</html>
