<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founder Verification - Artus AI</title>
    <link rel="preconnect" data-href="https://fonts.googleapis.com">
    <link rel="preconnect" data-href="https://fonts.gstatic.com" crossorigin>
    <link data-href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%);
        }

        .auth-layout {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            min-height: 100vh;
            padding: 3rem;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 480px;
            position: relative;
        }

        .auth-content {
            width: 100%;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-lockup {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 3rem;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(255, 69, 0, 0.3));
        }

        .brand-name {
            font-size: 24px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -0.5px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #FFFFFF;
            margin: 0 0 16px 0;
            letter-spacing: -0.5px;
            line-height: 1.2;
            text-align: center;
        }

        .helper-text {
            font-size: 16px;
            color: #B0B0B0;
            margin: 0 0 32px 0;
            line-height: 1.5;
            text-align: center;
            white-space: pre-line;
        }

        .helper-text .luna-tone {
            color: #D1D5DB;
            font-weight: 500;
        }

        .otp-container {
            margin-bottom: 16px;
        }

        .otp-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 12px;
        }

        .otp-input {
            width: 56px;
            height: 64px;
            border: 2px solid #2C2C2C;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            color: #FFFFFF;
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(10px);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        .otp-input:focus {
            border-color: #FF4500;
            box-shadow: 0 0 0 4px rgba(255, 69, 0, 0.15), 0 4px 12px rgba(255, 69, 0, 0.2);
            transform: scale(1.05);
            background: rgba(37, 37, 37, 0.8);
        }

        .otp-input:hover:not(:disabled) {
            border-color: #3A3A3A;
            background: rgba(37, 37, 37, 0.8);
        }

        .otp-input.filled {
            border-color: #FF4500;
            background: rgba(42, 26, 16, 0.6);
        }

        .otp-input.error {
            border-color: #EF4444;
            background: rgba(42, 16, 16, 0.6);
            animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .timer-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            padding: 8px 0;
            margin-bottom: 24px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .timer-icon {
            flex-shrink: 0;
        }

        .timer-content {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .timer-label {
            font-size: 12px;
            color: #808080;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .timer-display {
            font-size: 16px;
            font-weight: 600;
            color: #9CA3AF;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
        }

        .timer-display.warning {
            color: #F59E0B;
            animation: pulse 1s ease-in-out infinite;
        }

        .timer-display.expired {
            color: #EF4444;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .error-message {
            display: none;
            align-items: flex-start;
            gap: 10px;
            padding: 14px 16px;
            background: rgba(42, 16, 16, 0.8);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            margin-bottom: 24px;
            animation: slideDown 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .error-message.visible {
            display: flex;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            flex-shrink: 0;
            margin-top: 2px;
        }

        .error-text {
            font-size: 14px;
            color: #FCA5A5;
            font-weight: 500;
            line-height: 1.5;
        }

        .error-text .luna-msg {
            display: block;
            margin-top: 4px;
            font-size: 13px;
            color: #F87171;
            font-style: italic;
            opacity: 0.9;
        }

        .btn-primary {
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, #FF4500 0%, #E03E00 100%);
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(255, 69, 0, 0.3), 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 69, 0, 0.4), 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:hover:not(:disabled)::before {
            opacity: 1;
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: linear-gradient(135deg, #2C2C2C 0%, #1E1E1E 100%);
            color: #666666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .resend-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #B0B0B0;
            line-height: 1.6;
        }

        .resend-link button {
            background: none;
            border: none;
            color: #FF4500;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            padding: 0;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
        }

        .resend-link button:disabled {
            color: #666666;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .resend-link button:not(:disabled)::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #FF4500 0%, #FF6B3D 100%);
            transition: width 0.3s ease;
        }

        .resend-link button:hover:not(:disabled) {
            color: #FF6B3D;
        }

        .resend-link button:hover:not(:disabled)::after {
            width: 100%;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #FFFFFF;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-primary.loading .btn-text {
            display: none;
        }

        .btn-primary.loading .loading-spinner {
            display: block;
        }

        @media (max-width: 1024px) {
            .auth-layout {
                padding: 2rem;
            }
        }

        @media (max-width: 640px) {
            .auth-layout {
                padding: 1.5rem;
            }

            .auth-content {
                max-width: 100%;
            }

            .page-title {
                font-size: 28px;
            }

            .helper-text {
                font-size: 15px;
            }

            .otp-inputs {
                gap: 8px;
            }

            .otp-input {
                width: 48px;
                height: 56px;
                font-size: 20px;
            }

            .brand-lockup {
                margin-bottom: 2rem;
            }

            .timer-display {
                font-size: 15px;
            }

            .timer-container {
                padding: 6px 0;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="auth-layout">
            <div class="left-panel">
                <div class="auth-content">
                    <div class="brand-lockup">
                        <img src="https://haseeb3294.sirv.com/artus/orrange-logo.png" alt="Artus AI" class="brand-logo">
                        <span class="brand-name">Artus AI</span>
                    </div>

                    <h1 class="page-title">Founder Verification</h1>

                    <p class="helper-text"><span class="luna-tone">I sent you both a secure key.
Enter it below for access</span></p>

                    <div class="otp-container">
                        <div class="otp-inputs">
                            <input type="text" maxlength="1" class="otp-input" data-index="0" inputmode="numeric" pattern="[0-9]">
                            <input type="text" maxlength="1" class="otp-input" data-index="1" inputmode="numeric" pattern="[0-9]">
                            <input type="text" maxlength="1" class="otp-input" data-index="2" inputmode="numeric" pattern="[0-9]">
                            <input type="text" maxlength="1" class="otp-input" data-index="3" inputmode="numeric" pattern="[0-9]">
                            <input type="text" maxlength="1" class="otp-input" data-index="4" inputmode="numeric" pattern="[0-9]">
                            <input type="text" maxlength="1" class="otp-input" data-index="5" inputmode="numeric" pattern="[0-9]">
                        </div>
                    </div>

                    <div class="timer-container">
                        <svg class="timer-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="10" stroke="#9CA3AF" stroke-width="2" fill="none"/>
                            <path d="M12 6V12L16 14" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <div class="timer-content">
                            <div class="timer-display" id="timerDisplay">05:00</div>
                        </div>
                    </div>

                    <div class="error-message" id="errorMessage">
                        <svg class="error-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10 0C4.48 0 0 4.48 0 10C0 15.52 4.48 20 10 20C15.52 20 20 15.52 20 10C20 4.48 15.52 0 10 0ZM11 15H9V13H11V15ZM11 11H9V5H11V11Z" fill="#F87171"/>
                        </svg>
                        <div>
                            <div class="error-text" id="errorText">Invalid code. Please try again.</div>
                        </div>
                    </div>

                    <button class="btn-primary" id="verifyBtn" data-route="SCR045" disabled>
                        <span class="btn-text">Verify</span>
                        <div class="loading-spinner"></div>
                    </button>

                    <div class="resend-link">
                        Nothing in your inbox? <button id="resendBtn" data-route="SCR043" disabled>Send new OTP</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const otpInputs = document.querySelectorAll('.otp-input');
        const verifyBtn = document.getElementById('verifyBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const resendBtn = document.getElementById('resendBtn');
        const timerDisplay = document.getElementById('timerDisplay');

        let otpValue = ['', '', '', '', '', ''];
        let timeRemaining = 300;
        let timerInterval;

        const lunaErrorMessages = [
            {
                main: 'Hmm, that code doesn't match.',
                luna: 'Double-check your inbox and try again—I believe in you! 🔍'
            },
            {
                main: 'Oops! This code has expired.',
                luna: 'No worries—just grab a fresh one below. I'll wait! ⏰'
            },
            {
                main: 'That's not quite right.',
                luna: 'Take another look at those digits. You've got this! 💪'
            }
        ];

        function startTimer() {
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();

                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    resendBtn.disabled = false;
                    timerDisplay.classList.add('expired');
                    
                    errorText.innerHTML = `Oops! This code has expired.<span class="luna-msg">No worries—just grab a fresh one below. I'll wait! ⏰</span>`;
                    errorMessage.classList.add('visible');
                    
                    otpInputs.forEach(input => {
                        input.disabled = true;
                        input.classList.add('error');
                    });
                    verifyBtn.disabled = true;
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            timerDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            timerDisplay.classList.remove('warning', 'expired');
            if (timeRemaining <= 60 && timeRemaining > 0) {
                timerDisplay.classList.add('warning');
            }
        }

        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const value = e.target.value.replace(/[^0-9]/g, '');
                
                if (value) {
                    otpValue[index] = value;
                    input.value = value;
                    input.classList.add('filled');
                    
                    if (index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }
                } else {
                    otpValue[index] = '';
                    input.classList.remove('filled');
                }

                errorMessage.classList.remove('visible');
                otpInputs.forEach(inp => inp.classList.remove('error'));

                updateVerifyButton();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    otpInputs[index - 1].focus();
                    otpValue[index - 1] = '';
                    otpInputs[index - 1].value = '';
                    otpInputs[index - 1].classList.remove('filled');
                    updateVerifyButton();
                }

                if (e.key === 'ArrowLeft' && index > 0) {
                    otpInputs[index - 1].focus();
                }

                if (e.key === 'ArrowRight' && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
                
                pastedData.split('').forEach((char, i) => {
                    if (otpInputs[i]) {
                        otpInputs[i].value = char;
                        otpValue[i] = char;
                        otpInputs[i].classList.add('filled');
                    }
                });

                if (pastedData.length === 6) {
                    otpInputs[5].focus();
                } else if (pastedData.length > 0) {
                    otpInputs[pastedData.length - 1].focus();
                }

                updateVerifyButton();
            });
        });

        function updateVerifyButton() {
            const isFilled = otpValue.every(v => v !== '');
            verifyBtn.disabled = !isFilled || timeRemaining <= 0;
        }

        verifyBtn.addEventListener('click', (e) => {
            const otp = otpValue.join('');
            
            if (otp.length !== 6) {
                return;
            }

            verifyBtn.classList.add('loading');
            verifyBtn.disabled = true;

            setTimeout(() => {
                const isValid = Math.random() > 0.3;
                
                if (!isValid) {
                    verifyBtn.classList.remove('loading');
                    verifyBtn.disabled = false;
                    
                    const selectedError = lunaErrorMessages[Math.floor(Math.random() * lunaErrorMessages.length)];
                    
                    errorText.innerHTML = `${selectedError.main}<span class="luna-msg">${selectedError.luna}</span>`;
                    errorMessage.classList.add('visible');
                    
                    otpInputs.forEach(input => {
                        input.classList.add('error');
                        input.value = '';
                    });
                    
                    otpValue = ['', '', '', '', '', ''];
                    otpInputs[0].focus();
                    updateVerifyButton();
                }
            }, 1500);
        });

        resendBtn.addEventListener('click', () => {
            clearInterval(timerInterval);
            timeRemaining = 300;
            resendBtn.disabled = true;
            
            otpInputs.forEach(input => {
                input.value = '';
                input.classList.remove('filled', 'error');
                input.disabled = false;
            });
            otpValue = ['', '', '', '', '', ''];
            errorMessage.classList.remove('visible');
            timerDisplay.classList.remove('warning', 'expired');
            updateVerifyButton();
            updateTimerDisplay();
            startTimer();
            otpInputs[0].focus();
        });

        startTimer();
        otpInputs[0].focus();
    </script>
</body>
</html>
